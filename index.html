<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F0F11">
<title>App Financial</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="style.css?v=16">
</head>
<body>

<!-- Tela de carregamento, mostrada enquanto verificamos se já existe sessão -->
<div id="carregandoAuth" class="login-overlay">
  <span class="brand-mark" aria-hidden="true"></span>
</div>

<!-- Tela de login -->
<div id="loginOverlay" class="login-overlay" hidden>
  <div class="login-caixa">
    <span class="brand-mark" aria-hidden="true"></span>
    <h1 class="brand-nome">App Financial</h1>
    <p class="login-explicacao">Entre com sua conta Google para acessar seus dados.</p>
    <button type="button" id="btnLoginGoogle" class="btn-primario btn-login-google">
      <svg viewBox="0 0 48 48" aria-hidden="true" width="20" height="20"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.1 5.1 29.3 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.1 5.1 29.3 3 24 3 16.3 3 9.7 7.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 36.5 26.7 37 24 37c-5.3 0-9.7-3.1-11.3-7.8l-6.5 5C9.6 40.5 16.2 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.6l6.2 5.2C40.9 36.3 45 30.9 45 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      Entrar com Google
    </button>
  </div>
</div>

<div id="appRoot" hidden>

<div class="topbar-mobile">
  <button id="btnMenuMobile" class="icon-btn" aria-label="Abrir menu">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
  </button>
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <span class="brand-nome">App Financial</span>
  </div>
</div>

<div id="sidebarOverlay" class="sidebar-overlay" hidden></div>

<nav id="sidebar" class="sidebar">
  <div class="sidebar-topo">
    <span class="brand-mark" aria-hidden="true"></span>
    <span class="brand-nome">App Financial</span>
  </div>

  <div class="sidebar-nav">
    <button type="button" class="nav-item" data-tela="grade" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Grade anual
    </button>
    <button type="button" class="nav-item" data-tela="contas">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5l1.5 1.5L8 5"/><path d="M4 12.5l1.5 1.5L8 11"/><path d="M4 18.5l1.5 1.5L8 17"/><path d="M11.5 6h8.5M11.5 12h8.5M11.5 18h8.5"/></svg>
      Contas a pagar
    </button>
  </div>

  <div class="sidebar-rodape">
    <span id="infoUsuario" class="info-usuario"></span>
    <button id="btnLogout" class="icon-btn" aria-label="Sair">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 17l5-5-5-5M20 12H9M12 19H6a2 2 0 01-2-2V7a2 2 0 012-2h6"/></svg>
    </button>
  </div>
</nav>

<div class="conteudo-app">

<section id="telaGrade" class="tela">

  <div class="seletor-ano">
    <button id="btnAnoAnterior" class="ano-nav" aria-label="Ano anterior">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <div class="ano-atual">
      <span class="ano-label" id="labelAno">2026</span>
      <span class="ano-sub">ano fiscal</span>
    </div>
    <button id="btnAnoProximo" class="ano-nav" aria-label="Próximo ano">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

  <main>
    <section id="resumoAno" class="resumo" hidden></section>

    <div class="secao-cabecalho">
      <h2 class="secao-titulo">Grade anual</h2>
      <span class="secao-dica">clique numa célula para lançar</span>
    </div>

    <div id="gradeContainer" class="grade-wrapper">
      <p class="estado-vazio">Carregando…</p>
    </div>
  </main>

</section>

<section id="telaContas" class="tela" hidden>

  <div class="seletor-ano">
    <button id="btnMesAnterior" class="ano-nav" aria-label="Mês anterior">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
    </button>
    <div class="ano-atual">
      <span class="ano-label" id="labelMesContas">Julho</span>
      <span class="ano-sub" id="labelAnoContas">2026</span>
    </div>
    <button id="btnMesProximo" class="ano-nav" aria-label="Próximo mês">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

  <main>
    <section id="resumoContas" class="resumo" hidden></section>

    <div class="secao-cabecalho">
      <h2 class="secao-titulo">Contas a pagar</h2>
      <span class="secao-dica">clique no valor pra editar</span>
    </div>

    <div id="contasContainer" class="contas-wrapper">
      <p class="estado-vazio">Carregando…</p>
    </div>
  </main>

</section>

</div>

</div>

<!-- Modal: criar novo ano -->
<dialog id="modalNovoAno">
  <form id="formNovoAno" method="dialog">
    <h3>Criar ano <span id="labelNovoAno"></span></h3>

    <label class="opcao-radio">
      <input type="radio" name="modoNovoAno" value="copiar" checked>
      <span>
        <strong>Copiar do ano anterior</strong>
        <small>Traz as categorias e todos os lançamentos já feitos.</small>
      </span>
    </label>
    <label class="opcao-radio">
      <input type="radio" name="modoNovoAno" value="zerado">
      <span>
        <strong>Começar zerado</strong>
        <small>Traz só as categorias, sem nenhum valor.</small>
      </span>
    </label>

    <div class="modal-botoes">
      <button type="button" id="btnCancelarNovoAno" class="btn-secundario">Cancelar</button>
      <button type="submit" class="btn-primario">Criar ano</button>
    </div>
  </form>
</dialog>

<!-- Modal: criar novo ano de contas a pagar -->
<dialog id="modalNovoAnoContas">
  <form id="formNovoAnoContas" method="dialog">
    <h3>Criar contas de <span id="labelNovoAnoContas"></span></h3>

    <label class="opcao-radio">
      <input type="radio" name="modoNovoAnoContas" value="copiar" checked>
      <span>
        <strong>Copiar do ano anterior</strong>
        <small>Traz os grupos, itens e valores já lançados.</small>
      </span>
    </label>
    <label class="opcao-radio">
      <input type="radio" name="modoNovoAnoContas" value="zerado">
      <span>
        <strong>Começar zerado</strong>
        <small>Traz só os grupos e itens, sem valores nem status de pago.</small>
      </span>
    </label>

    <div class="modal-botoes">
      <button type="button" id="btnCancelarNovoAnoContas" class="btn-secundario">Cancelar</button>
      <button type="submit" class="btn-primario">Criar</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast" hidden></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js?v=16"></script>
</body>
</html>
