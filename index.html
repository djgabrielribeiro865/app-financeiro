<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F0F11">
<title>Controle Financeiro</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <span class="brand-nome">Financeiro</span>
  </div>
  <div class="topbar-acoes">
    <button id="btnNovoAno" class="icon-btn" aria-label="Criar novo ano">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button id="btnConfig" class="icon-btn" aria-label="Configurações">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2.5v2M12 19.5v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2.5 12h2M19.5 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
    </button>
  </div>
</header>

<div class="seletor-ano">
  <button id="btnAnoAnterior" class="ano-nav" aria-label="Ano anterior">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
  </button>
  <div class="ano-atual">
    <span class="ano-label" id="labelAno">2026</span>
    <span class="ano-sub">ano fiscal</span>
  </div>
  <button id="btnAnoProximo" class="ano-nav" aria-label="Próximo ano">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7"/></svg>
  </button>
</div>

<main>
  <section id="resumoAno" class="resumo" hidden></section>

  <div class="secao-cabecalho">
    <h2 class="secao-titulo">Grade anual</h2>
    <span class="secao-dica">clique numa célula para lançar</span>
  </div>

  <div id="gradeContainer" class="grade-wrapper">
    <p class="estado-vazio">Carregando…</p>
  </div>
</main>

<!-- Modal: criar novo ano -->
<dialog id="modalNovoAno">
  <form id="formNovoAno" method="dialog">
    <h3>Criar ano <span id="labelNovoAno"></span></h3>

    <label class="opcao-radio">
      <input type="radio" name="modoNovoAno" value="copiar" checked>
      <span>
        <strong>Copiar do ano anterior</strong>
        <small>Traz as categorias e todos os lançamentos já feitos.</small>
      </span>
    </label>
    <label class="opcao-radio">
      <input type="radio" name="modoNovoAno" value="zerado">
      <span>
        <strong>Começar zerado</strong>
        <small>Traz só as categorias, sem nenhum valor.</small>
      </span>
    </label>

    <div class="modal-botoes">
      <button type="button" id="btnCancelarNovoAno" class="btn-secundario">Cancelar</button>
      <button type="submit" class="btn-primario">Criar ano</button>
    </div>
  </form>
</dialog>

<!-- Modal: configuração da API -->
<dialog id="modalConfig">
  <form id="formConfig" method="dialog">
    <h3>Conexão com a planilha</h3>
    <p class="config-explicacao">Cole a URL do seu Apps Script e o token gerado nele.</p>

    <label>URL da API
      <input type="url" id="campoApiUrl" placeholder="https://script.google.com/macros/s/.../exec" required>
    </label>

    <label>Token
      <input type="text" id="campoApiToken" placeholder="cole o token aqui" required>
    </label>

    <div class="modal-botoes">
      <button type="button" id="btnCancelarConfig" class="btn-secundario">Cancelar</button>
      <button type="submit" class="btn-primario">Salvar</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast" hidden></div>

<script src="app.js?v=5"></script>
</body>
</html>
