<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1A1B1E">
<title>Controle Financeiro</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <button id="btnAnoAnterior" class="icon-btn" aria-label="Ano anterior">‹</button>
  <div class="mes-atual">
    <span id="labelAno">2026</span>
  </div>
  <button id="btnAnoProximo" class="icon-btn" aria-label="Próximo ano">›</button>
  <button id="btnNovoAno" class="icon-btn" aria-label="Criar novo ano">+</button>
  <button id="btnConfig" class="icon-btn config-btn" aria-label="Configurações">⚙</button>
</header>

<main>
  <div class="grade-cabecalho">
    <h2 class="secao-titulo">Lançamentos do ano</h2>
    <button id="btnGerenciarCategorias" class="link-btn">Categorias</button>
  </div>

  <div id="gradeContainer" class="grade-wrapper">
    <p class="estado-vazio">Carregando...</p>
  </div>
</main>

<!-- Modal: criar novo ano -->
<dialog id="modalNovoAno">
  <form id="formNovoAno" method="dialog">
    <h3>Criar ano <span id="labelNovoAno"></span></h3>

    <label class="opcao-radio">
      <input type="radio" name="modoNovoAno" value="copiar" checked>
      Copiar categorias e lançamentos do ano atual
    </label>
    <label class="opcao-radio">
      <input type="radio" name="modoNovoAno" value="zerado">
      Criar estrutura zerada (só as categorias)
    </label>

    <div class="modal-botoes">
      <button type="button" id="btnCancelarNovoAno" class="btn-secundario">Cancelar</button>
      <button type="submit" class="btn-primario">Criar</button>
    </div>
  </form>
</dialog>

<!-- Modal: gerenciar categorias -->
<dialog id="modalCategorias">
  <h3>Categorias</h3>

  <div id="listaCategoriasModal" class="lista-categorias-modal"></div>

  <form id="formNovaCategoria" class="form-nova-categoria">
    <label>Nome
      <input type="text" id="novaCategoriaNome" placeholder="Ex: Mercado" required>
    </label>
    <label>Tipo
      <select id="novaCategoriaTipo">
        <option value="Saída">Saída</option>
        <option value="Entrada">Entrada</option>
      </select>
    </label>
    <label>Valor planejado mensal
      <input type="number" id="novaCategoriaValor" step="0.01" min="0" placeholder="0,00" required>
    </label>
    <div class="modal-botoes">
      <button type="button" id="btnFecharCategorias" class="btn-secundario">Fechar</button>
      <button type="submit" class="btn-primario">Adicionar categoria</button>
    </div>
  </form>
</dialog>

<!-- Modal: configuração da API -->
<dialog id="modalConfig">
  <form id="formConfig" method="dialog">
    <h3>Conexão com a planilha</h3>
    <p class="config-explicacao">Cole a URL do seu Apps Script e o token gerado nele.</p>

    <label>URL da API
      <input type="url" id="campoApiUrl" placeholder="https://script.google.com/macros/s/.../exec" required>
    </label>

    <label>Token
      <input type="text" id="campoApiToken" required>
    </label>

    <div class="modal-botoes">
      <button type="button" id="btnCancelarConfig" class="btn-secundario">Cancelar</button>
      <button type="submit" class="btn-primario">Salvar</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
